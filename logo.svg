<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BA68C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="300" height="300" fill="url(#bgGrad)"/>

  <!-- Runner figure -->
  <g transform="translate(80, 90)">
    <!-- Head -->
    <circle cx="15" cy="10" r="6" fill="url(#purpleGrad)"/>
    <!-- Body -->
    <line x1="15" y1="16" x2="15" y2="35" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Left arm -->
    <line x1="15" y1="20" x2="2" y2="15" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="15" y1="20" x2="28" y2="12" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="15" y1="35" x2="8" y2="50" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="15" y1="35" x2="22" y2="50" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Horse figure -->
  <g transform="translate(130, 85)">
    <!-- Head -->
    <ellipse cx="10" cy="8" rx="5" ry="7" fill="url(#purpleGrad)"/>
    <!-- Mane -->
    <path d="M 10 2 L 12 0 L 13 3" stroke="url(#purpleGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Neck -->
    <line x1="10" y1="15" x2="10" y2="28" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Body -->
    <ellipse cx="18" cy="32" rx="12" ry="8" fill="url(#purpleGrad)"/>
    <!-- Front legs -->
    <line x1="14" y1="40" x2="12" y2="55" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="40" x2="16" y2="55" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Back legs -->
    <line x1="26" y1="40" x2="28" y2="55" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="40" x2="32" y2="55" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tail -->
    <path d="M 30 32 Q 40 30 42 35" stroke="url(#purpleGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Motion lines -->
  <line x1="50" y1="110" x2="65" y2="108" stroke="url(#purpleGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="120" x2="62" y2="122" stroke="url(#purpleGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Text: ROMORE -->
  <text x="150" y="240" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#purpleGrad)" text-anchor="middle" letter-spacing="2">ROMORE</text>

  <!-- Text: ATHLETIC & NUTRITION -->
  <text x="150" y="265" font-family="Arial, sans-serif" font-size="12" fill="#999999" text-anchor="middle" letter-spacing="1">ATHLETIC &amp; NUTRITION</text>
</svg>