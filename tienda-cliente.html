<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROMORE - Tienda Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c1324;
            background-image: radial-gradient(circle at 50% 50%, #1a1535 0%, #0c1324 100%);
            font-family: 'Inter', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0c1324 0%, #191f31 100%);
            border-bottom: 2px solid #ddb7ff;
            backdrop-filter: blur(12px);
            padding: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo {
            width: 180px;
            height: 180px;
            flex-shrink: 0;
        }

        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .productos-section {
            flex: 1;
            min-width: 0;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #b76dff;
        }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #b76dff;
            border-bottom-color: #b76dff;
        }

        .tab-btn:hover {
            color: #ddb7ff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .producto-card {
            background: rgba(25, 31, 49, 0.4);
            border: 2px solid rgba(221, 183, 255, 0.15);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .producto-card:hover {
            border-color: rgba(221, 183, 255, 0.5);
            background: rgba(25, 31, 49, 0.6);
            box-shadow: 0 0 20px rgba(221, 183, 255, 0.2);
        }

        .product-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
        }

        .product-nombre {
            font-weight: 600;
            font-size: 12px;
            color: #ddb7ff;
            cursor: pointer;
            line-height: 1.3;
        }

        .product-precio {
            font-size: 14px;
            font-weight: bold;
            color: #2fd9f4;
        }

        .product-stock {
            font-size: 11px;
            color: #988d9f;
        }

        .product-controls {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .input-cantidad {
            width: 45px;
            padding: 4px;
            background: rgba(221, 183, 255, 0.1);
            border: 1px solid #b76dff;
            border-radius: 4px;
            color: #ddb7ff;
            font-size: 12px;
            text-align: center;
        }

        .btn-agregar {
            flex: 1;
            padding: 4px;
            background: rgba(221, 183, 255, 0.2);
            border: 1px solid #ddb7ff;
            border-radius: 4px;
            color: #ddb7ff;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-agregar:hover {
            background: rgba(221, 183, 255, 0.4);
            box-shadow: 0 0 10px rgba(221, 183, 255, 0.3);
        }

        .carrito-section {
            width: 350px;
            background: rgba(25, 31, 49, 0.5);
            border: 2px solid rgba(221, 183, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            max-height: 600px;
        }

        .carrito-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #b76dff;
        }

        .carrito-title {
            font-size: 18px;
            font-weight: bold;
            color: #ddb7ff;
        }

        .carrito-contador {
            background: #b76dff;
            color: #0c1324;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .carrito-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .carrito-vacio {
            text-align: center;
            color: #988d9f;
            padding: 20px;
            font-size: 14px;
        }

        .carrito-item {
            background: rgba(221, 183, 255, 0.1);
            border: 1px solid rgba(221, 183, 255, 0.2);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .carrito-item-nombre {
            flex: 1;
            color: #ddb7ff;
            font-weight: 600;
        }

        .carrito-item-cantidad {
            color: #2fd9f4;
            margin: 0 8px;
        }

        .carrito-item-precio {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ddb7ff;
            font-weight: bold;
        }

        .carrito-item-eliminar {
            cursor: pointer;
            color: #ffb4ab;
            font-weight: bold;
            transition: all 0.3s;
        }

        .carrito-item-eliminar:hover {
            color: #ff6b6b;
            transform: scale(1.2);
        }

        .carrito-total {
            background: rgba(221, 183, 255, 0.15);
            border: 2px solid #b76dff;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .carrito-total-label {
            color: #988d9f;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .carrito-total-valor {
            font-size: 24px;
            font-weight: bold;
            color: #2fd9f4;
        }

        .btn-enviar {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ddb7ff 0%, #b76dff 100%);
            color: #0c1324;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-enviar:hover:not(:disabled) {
            box-shadow: 0 0 20px rgba(221, 183, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-enviar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal de Detalle */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #191f31 0%, #0c1324 100%);
            border: 2px solid #ddb7ff;
            border-radius: 12px;
            padding: 30px;
            max-width: 900px;
            width: 90%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            box-shadow: 0 0 40px rgba(221, 183, 255, 0.3);
            align-items: start;
        }

        .modal-imagen-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #b76dff;
        }

        .modal-detalles-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-descripcion-box {
            background: rgba(221, 183, 255, 0.05);
            border: 1px solid rgba(221, 183, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            min-height: 120px;
            max-height: 180px;
            overflow-y: auto;
        }

        .modal-nombre {
            font-size: 24px;
            font-weight: bold;
            color: #ddb7ff;
        }

        .modal-categoria {
            font-size: 12px;
            color: #2fd9f4;
            font-weight: 600;
        }

        .modal-precio {
            font-size: 28px;
            font-weight: bold;
            color: #2fd9f4;
        }

        .modal-stock {
            font-size: 14px;
            color: #988d9f;
        }

        .modal-descripcion {
            color: #ccc;
            font-size: 14px;
            line-height: 1.5;
        }

        .modal-cantidad {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(221, 183, 255, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(221, 183, 255, 0.2);
        }

        .modal-cantidad label {
            color: #ddb7ff;
            font-size: 14px;
            font-weight: 600;
        }

        .modal-cantidad input {
            width: 80px;
            padding: 8px;
            background: rgba(221, 183, 255, 0.1);
            border: 1px solid #b76dff;
            border-radius: 4px;
            color: #ddb7ff;
            text-align: center;
            font-weight: 600;
        }

        .modal-botones {
            display: flex;
            gap: 10px;
        }

        .btn-agregar-modal {
            flex: 1;
            padding: 10px;
            background: rgba(221, 183, 255, 0.2);
            border: 1px solid #ddb7ff;
            border-radius: 6px;
            color: #ddb7ff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-agregar-modal:hover {
            background: rgba(221, 183, 255, 0.4);
            box-shadow: 0 0 15px rgba(221, 183, 255, 0.3);
        }

        .btn-cerrar {
            flex: 1;
            padding: 10px;
            background: rgba(181, 109, 255, 0.1);
            border: 1px solid #b76dff;
            border-radius: 6px;
            color: #b76dff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-cerrar:hover {
            background: rgba(181, 109, 255, 0.2);
        }

        @media (max-width: 768px) {
            .modal-content {
                grid-template-columns: 1fr;
                max-width: 100%;
            }

            .modal-img {
                height: 250px;
            }
        }

        @media (max-width: 1200px) {
            .main-container {
                flex-direction: column;
            }

            .carrito-section {
                width: 100%;
                max-height: none;
            }
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body class="dark">
    <div class="header">
        <img src="./logopng.png" alt="ROMORE" class="header-logo">
    </div>

    <div class="main-container">
        <div class="productos-section">
            <div class="tabs">
                <button class="tab-btn active" onclick="cambiarTab('tab-nutricion')">🥤 Nutrición</button>
                <button class="tab-btn" onclick="cambiarTab('tab-ropa')">👕 Ropa Deportiva</button>
            </div>

            <div id="tab-nutricion" class="tab-content active">
                <div class="grid" id="gridNutricion"></div>
            </div>

            <div id="tab-ropa" class="tab-content">
                <div class="grid" id="gridRopa"></div>
            </div>
        </div>

        <div class="carrito-section">
            <div class="carrito-header">
                <span class="carrito-title">🛒 Tu Carrito</span>
                <span class="carrito-contador" id="carritoContador">0</span>
            </div>

            <div class="carrito-items" id="carritoItems">
                <div class="carrito-vacio">Tu carrito está vacío</div>
            </div>

            <div class="carrito-total">
                <div class="carrito-total-label">TOTAL</div>
                <div class="carrito-total-valor" id="totalPrecio">$0</div>
            </div>

            <button class="btn-enviar" id="btnEnviar" onclick="enviarPedido()" disabled>📲 Enviar por WhatsApp</button>
        </div>
    </div>

    <!-- Modal de Detalle de Producto -->
    <div id="modalDetalle" class="modal">
        <div class="modal-content">
            <!-- Columna Izquierda: Imagen -->
            <div class="modal-imagen-container">
                <img id="modalImg" src="" alt="" class="modal-img">
            </div>

            <!-- Columna Derecha: Detalles -->
            <div class="modal-detalles-container">
                <div id="modalCategoria" class="modal-categoria"></div>
                <div id="modalNombre" class="modal-nombre"></div>
                <div id="modalPrecio" class="modal-precio"></div>
                <div id="modalStock" class="modal-stock"></div>

                <!-- Descripción en recuadro -->
                <div class="modal-descripcion-box">
                    <div id="modalDescripcion" class="modal-descripcion"></div>
                </div>

                <div class="modal-cantidad">
                    <label>Cantidad:</label>
                    <input id="cantidadModal" type="number" min="1" max="999" value="1">
                </div>
                <div class="modal-botones">
                    <button class="btn-cerrar" onclick="cerrarModal()">✕ Cerrar</button>
                    <button class="btn-agregar-modal" onclick="agregarAlCarritoDesdeModal()">🛒 Agregar al Carrito</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const NUMERO_WHATSAPP = '+573116377287';

        // Firebase (solo lectura del catálogo)
        const firebaseConfig = {
            apiKey: "AIzaSyCT6StnuHvECePZnsrB-ueqJsx_uLPcrAU",
            authDomain: "romore-admin.firebaseapp.com",
            projectId: "romore-admin",
            storageBucket: "romore-admin.appspot.com",
            messagingSenderId: "1004587660155",
            appId: "1:1004587660155:web:37a2792b784e1988df03de"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Global State
        let productosNutricion = [];
        let productosRopa = [];
        let carrito = [];
        let productoActualModal = null;

        // Load products: primero Firestore (catálogo actualizado por el admin), fallback a productos.json
        async function cargarProductos() {
            try {
                const doc = await db.collection('tienda').doc('catalogo').get();
                if (doc.exists) {
                    const data = doc.data();
                    productosNutricion = data.nutricion || [];
                    productosRopa = data.ropa || [];
                    renderizarProductos();
                    console.log('✅ Catálogo cargado desde Firestore:', productosNutricion.length + productosRopa.length);
                    return;
                }
            } catch (error) {
                console.warn('Firestore no disponible, usando productos.json:', error);
            }
            // Fallback: archivo estático
            try {
                const response = await fetch('./productos.json');
                const data = await response.json();
                productosNutricion = data.nutricion || [];
                productosRopa = data.ropa || [];
                renderizarProductos();
                console.log('✅ Productos cargados (json):', productosNutricion.length + productosRopa.length);
            } catch (error) {
                console.error('Error cargando productos:', error);
            }
        }

        function renderizarProductos() {
            renderizarGrid('nutricion', productosNutricion);
            renderizarGrid('ropa', productosRopa);
        }

        function renderizarGrid(tipo, productos) {
            const gridId = 'grid' + tipo.charAt(0).toUpperCase() + tipo.slice(1);
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';

            productos.forEach((producto, index) => {
                const card = document.createElement('div');
                card.className = 'producto-card';
                card.innerHTML = `
                    <img src="${producto.imagen}" alt="${producto.nombre}" class="product-image" onclick="abrirDetalleProducto(${index}, '${tipo}')">
                    <div class="product-nombre" onclick="abrirDetalleProducto(${index}, '${tipo}')">${producto.nombre}</div>
                    <div class="product-precio">$${producto.precio.toLocaleString('es-CO')}</div>
                    <div class="product-stock">Stock: ${producto.stock}</div>
                    <div class="product-controls">
                        <input type="number" class="input-cantidad" id="qty-${tipo}-${index}" value="1" min="1" max="${producto.stock}">
                        <button class="btn-agregar" onclick="agregarAlCarrito(${index}, '${tipo}')">🛒 +</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function agregarAlCarrito(index, tipo) {
            const productos = tipo === 'nutricion' ? productosNutricion : productosRopa;
            const producto = productos[index];
            const cantidad = parseInt(document.getElementById(`qty-${tipo}-${index}`).value) || 1;

            if (cantidad > 0 && cantidad <= producto.stock) {
                carrito.push({
                    ...producto,
                    cantidad,
                    tipo
                });
                actualizarCarrito();
            }
        }

        function agregarAlCarritoDesdeModal() {
            if (!productoActualModal) return;
            const { producto, tipo } = productoActualModal;
            const cantidad = parseInt(document.getElementById('cantidadModal').value) || 1;

            if (cantidad > 0 && cantidad <= producto.stock) {
                carrito.push({
                    ...producto,
                    cantidad,
                    tipo
                });
                actualizarCarrito();
                cerrarModal();
            }
        }

        function actualizarCarrito() {
            const carritoItems = document.getElementById('carritoItems');
            const carritoContador = document.getElementById('carritoContador');
            const totalPrecio = document.getElementById('totalPrecio');
            const btnEnviar = document.getElementById('btnEnviar');

            if (carrito.length === 0) {
                carritoItems.innerHTML = '<div class="carrito-vacio">Tu carrito está vacío</div>';
                carritoContador.textContent = '0';
                totalPrecio.textContent = '$0';
                btnEnviar.disabled = true;
                return;
            }

            carritoContador.textContent = carrito.length;
            let total = 0;
            carritoItems.innerHTML = '';

            carrito.forEach((item, idx) => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'carrito-item';
                itemDiv.innerHTML = `
                    <div class="carrito-item-nombre">${item.nombre}</div>
                    <div class="carrito-item-cantidad">x${item.cantidad}</div>
                    <div class="carrito-item-precio">
                        $${subtotal.toLocaleString('es-CO')}
                        <span class="carrito-item-eliminar" onclick="eliminarDelCarrito(${idx})">✕</span>
                    </div>
                `;
                carritoItems.appendChild(itemDiv);
            });

            totalPrecio.textContent = total.toLocaleString('es-CO');
            btnEnviar.disabled = false;
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            actualizarCarrito();
        }

        function abrirDetalleProducto(index, tipo) {
            const productos = tipo === 'nutricion' ? productosNutricion : productosRopa;
            const producto = productos[index];

            productoActualModal = { producto, tipo, index };

            document.getElementById('modalImg').src = producto.imagen;
            document.getElementById('modalNombre').textContent = producto.nombre;
            document.getElementById('modalPrecio').textContent = '$' + producto.precio.toLocaleString('es-CO');
            document.getElementById('modalStock').textContent = `Stock: ${producto.stock} unidades`;
            document.getElementById('modalDescripcion').textContent = producto.descripcion || 'Sin descripción disponible';
            document.getElementById('modalCategoria').innerHTML = tipo === 'ropa' ? (producto.talla || '') : '';

            document.getElementById('modalDetalle').classList.add('show');
        }

        function cerrarModal() {
            document.getElementById('modalDetalle').classList.remove('show');
            productoActualModal = null;
        }

        // Cambiar entre pestañas (Nutrición / Ropa)
        function cambiarTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const contenido = document.getElementById(tabId);
            if (contenido) contenido.classList.add('active');
            const ev = window.event;
            if (ev && ev.target) ev.target.classList.add('active');
        }

        // Enviar pedido por WhatsApp
        function enviarPedido() {
            if (carrito.length === 0) return;

            let mensaje = '¡Hola ROMORE Athletic! 🏃 Quiero hacer el siguiente pedido:%0A%0A';
            let total = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                mensaje += '• ' + item.nombre + ' x' + item.cantidad + ' - $' + subtotal.toLocaleString('es-CO') + '%0A';
            });

            mensaje += '%0A*TOTAL: $' + total.toLocaleString('es-CO') + '*';

            const numero = NUMERO_WHATSAPP.replace(/[^0-9]/g, '');
            const url = 'https://wa.me/' + numero + '?text=' + mensaje;
            window.open(url, '_blank');
        }

        // Inicializar tienda
        cargarProductos();
        actualizarCarrito();

    </script>
</body>
</html>
